version: '3.8'

services:
  email-triage-env:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-triage-env
    ports:
      - "7860:7860"
    volumes:
      - .:/app:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=7860
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    develop:
      watch:
        - path: .
          action: rebuild
